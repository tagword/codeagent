# pre-commit hooks — auto-run on `git commit`
# Install: pip install '.[lint]' && pre-commit install
# Run all:  pre-commit run --all-files

repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.11.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/PyCQA/bandit
    rev: 1.8.3
    hooks:
      - id: bandit
        args: [-s, B101, -ll]
        exclude: ^tests/|^\.venv/
