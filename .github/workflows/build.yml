name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install python.org Python 3.11 (macOS 12+ compatible)
        run: |
          curl -fsSL -o /tmp/python311.pkg \
            "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg"
          sudo installer -pkg /tmp/python311.pkg -target /

      - name: Build .app + DMG
        run: bash build_mac_dmg.sh
        env:
          CODEAGENT_BUILD_PYTHON: /Library/Frameworks/Python.framework/Versions/3.11/bin/python3
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-mac
          path: dist/CodeAgent-mac.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller CodeAgent.spec --distpath dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-win
          path: dist/CodeAgent.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CodeAgent-mac/CodeAgent-mac.dmg
            CodeAgent-win/CodeAgent-win.exe
          generate_release_notes: true
