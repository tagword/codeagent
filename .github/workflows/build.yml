name: Build & Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install python.org Python 3.11 (macOS 12+ compatible)
        run: |
          curl -fsSL -o /tmp/python311.pkg \
            "https://www.python.org/ftp/python/3.11.9/python-3.11.9-macos11.pkg"
          sudo installer -pkg /tmp/python311.pkg -target /

      - name: Install dependencies
        run: |
          /Library/Frameworks/Python.framework/Versions/3.11/bin/python3 -m pip install pillow

      - name: Build .app + DMG
        run: bash packaging/build_mac_dmg.sh
        env:
          CODEAGENT_BUILD_PYTHON: /Library/Frameworks/Python.framework/Versions/3.11/bin/python3
          MACOSX_DEPLOYMENT_TARGET: "12.0"

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-mac
          path: dist/CodeAgent-mac-*.dmg

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies (monorepo siblings from GitHub)
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          # MONO = repo root (= parent of packaging/). Same logic as build_mac_dmg.sh
          $mono = "${{ github.workspace }}"
          # Clone missing monorepo siblings (seed, seed-tools, seed-model-providers)
          # The spec file uses collect_all() on these packages + pathex includes MONO/<name>
          $siblings = @("seed", "seed-tools", "seed-model-providers")
          foreach ($src in $siblings) {
            $dir = Join-Path $mono $src
            if (-not (Test-Path (Join-Path $dir "pyproject.toml"))) {
              Write-Host "==> Clone $src to $dir"
              git clone --depth 1 "https://github.com/${{ github.repository_owner }}/${src}.git" $dir
            }
          }
          # Install all monorepo packages (editable, so PyInstaller can find them)
          pip install -e "$mono\seed-model-providers" -e "$mono\seed" -e "$mono\seed-tools[code]" -e "$mono"
          pip install pyinstaller
        env:
          GIT_TERMINAL_PROMPT: 0

      - name: Build with PyInstaller (Windows spec)
        run: pyinstaller packaging/CodeAgent.windows.spec --distpath dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeAgent-win
          path: dist/CodeAgent.exe

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            CodeAgent-mac/CodeAgent-mac-*.dmg
            CodeAgent-win/CodeAgent.exe
          generate_release_notes: true
