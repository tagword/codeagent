<div class="app">
  <nav class="activity-bar" id="activityBar" aria-label="活动栏">
    <div class="activity-bar__top">
      <button type="button" class="activity-btn active" data-mode="chat" title="聊天">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 018.5-8.5 8.38 8.38 0 013.8.9z" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <button type="button" class="activity-btn" data-mode="tasks" title="计划">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.75"/><path d="M12 7v6l4 2" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="activity-btn" data-mode="agent" title="Agent">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M12 5v2M10 3h4" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><rect x="6" y="8" width="12" height="12" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.75"/><circle cx="9.5" cy="13.5" r="1.2" fill="currentColor"/><circle cx="14.5" cy="13.5" r="1.2" fill="currentColor"/><path d="M9 18h6" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/><path d="M10 20v2h4v-2" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="activity-btn" data-mode="config" title="配置">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><circle cx="12" cy="12" r="3" fill="none" stroke="currentColor" stroke-width="1.75"/><path d="M12 2v2m0 18v2M4.93 4.93l1.41 1.41m11.32 11.32 1.41 1.41M2 12h2m18 0h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="activity-btn" data-mode="stats" title="统计">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M4 20V11M10 20V4M16 20v-7M22 20V9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
      </button>
      <button type="button" class="activity-btn" data-mode="files" title="文件">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M14 3v4a1 1 0 001 1h4" fill="none" stroke="currentColor" stroke-width="1.75"/><path d="M17 21H7a2 2 0 01-2-2V5a2 2 0 012-2h7l5 5v11a2 2 0 01-2 2z" fill="none" stroke="currentColor" stroke-width="1.75"/></svg>
      </button>
    </div>
    <div class="activity-bar__bottom">
      <button type="button" class="activity-btn" id="btnLogout" title="退出登录">
        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>
  </nav>
  <aside class="sidebar" aria-label="主导航">
    <div class="sidebar__head">
      <div class="brand">
        <img class="brand__logo" src="/icon.png" alt="" width="34" height="34" decoding="async"/>
        <div class="brand__text">
          <div class="brand__name">CodeAgent</div>
          <div class="brand__slogan">对话 · 工作台</div>
        </div>
      </div>
    </div>

    <aside id="chatSidebar" class="sess-panel" style="display:none;" aria-label="会话列表">
      <!-- 搜索栏 -->
      <div class="search-bar">
        <input type="text" id="treeSearchInput" class="search-bar__input" placeholder="搜索项目或会话... Ctrl+K">
      </div>
      <!-- 项目树 -->
      <div id="projectTree" class="project-tree" role="tree">
        <div class="project-tree__empty">加载中...</div>
      </div>
      <div class="project-tree__footer">
        <button class="tree-footer-btn" id="btnNewProject">+ 新建项目</button>
        <button class="tree-footer-btn" id="btnNewSession">+ 新建会话</button>
      </div>


    </aside>

    <section id="sidebarStats" class="sidebar-mode" style="display:none;">
      <div class="sidebar-mode__scroll">
        <div class="sidebar__head" style="padding-bottom:0;">
          <div class="brand brand--stats">
            <svg viewBox="0 0 24 24" width="22" height="22" aria-hidden="true"><path d="M4 20V11M10 20V4M16 20v-7M22 20V9" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round"/></svg>
            <div class="brand__text">
              <div class="brand__name" style="font-size:13px;">统计数据</div>
              <div class="brand__slogan" style="font-size:10.5px;" id="statsLastUpdated">加载中…</div>
            </div>
          </div>
        </div>
        <div class="stats-grid" id="statsGrid">
          <div class="stats-card"><div class="stats-card__value" id="statProjects">-</div><div class="stats-card__label">项目数</div></div>
          <div class="stats-card"><div class="stats-card__value" id="statSessions">-</div><div class="stats-card__label">会话数</div></div>
          <div class="stats-card"><div class="stats-card__value" id="statMessages">-</div><div class="stats-card__label">消息数</div></div>
          <div class="stats-card"><div class="stats-card__value" id="statTodos">-</div><div class="stats-card__label">待办项</div></div>
        </div>
        <div class="stats-section">
          <div class="sidebar__section-label" style="margin-top:0;">最近项目</div>
          <div id="statsRecentProjects" class="stats-recent"><div class="config-tool-list__empty">加载中…</div></div>
        </div>
        <div class="stats-section">
          <div class="sidebar__section-label" style="margin-top:0;">最近会话</div>
          <div id="statsRecentSessions" class="stats-recent"><div class="config-tool-list__empty">加载中…</div></div>
        </div>
      </div>
    </section>

    <section id="sidebarFiles" class="sidebar-mode" style="display:none;">
      <div class="sidebar-mode__scroll">
        <div class="sidebar__head" style="padding-bottom:0;">
          <div class="sidebar__section-label">文件浏览器</div>
        </div>
        <div id="fileTreeContainer" class="file-tree">
          <div class="file-tree__loading">加载中...</div>
        </div>
      </div>
    </section>
    <section id="sidebarGit" class="sidebar-mode" style="display:none;">
      <div class="sidebar-mode__scroll">
        <div class="sidebar__head" style="padding-bottom:0;">
          <div class="sidebar__section-label">源代码管理</div>
        </div>
        <div class="git-panel">
