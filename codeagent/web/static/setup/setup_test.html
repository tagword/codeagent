
  <!-- Step 2: Security Token -->
  <div class="card" id="step2">
    <div class="card-body">
      <div class="card-title">
        <span class="step-badge">2</span>
        访问 Token
      </div>
      <p class="card-desc">生成后请复制保存。</p>
      <div class="actions">
        <button id="btnFinish" type="button" class="btn-primary">生成 Token 并完成初始化</button>
      </div>
      <div class="token-display">
        <input id="tokenVal" readonly placeholder="点击上方按钮后显示"/>
        <button id="btnCopyToken" type="button" disabled>复制</button>
      </div>
      <div id="msg2" class="msg"></div>
      <p class="hint" id="tokenHint" style="display:none;">
        Token 已生成。请先复制保存，再进入第 3 步。
      </p>
    </div>
  </div>

  <!-- Step 3: Done + Start -->
  <div class="card" id="step3">
    <div class="card-body">
      <div class="card-title">
        <span class="step-badge">3</span>
        完成
      </div>
      <div class="actions">
        <button id="btnStart" type="button" class="btn-primary" disabled>开始对话 →</button>
      </div>
      <div id="msg3" class="msg"></div>
    </div>
  </div>
