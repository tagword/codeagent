  <link rel="icon" type="image/png" href="/icon.png"/>
  <link rel="apple-touch-icon" href="/icon.png"/>
  <title>CodeAgent</title>
  <!--
    This HTML file is assembled at runtime by server.get_app_html().
    The large parts live in sibling files under ./webui/ and are
    inlined below so the browser still receives a single self-contained
    page and no new HTTP routes are needed:

      CSS files (*.css)     ->  inlined into <style>
      body.html             ->  inlined between <body>...</body>
      JS files (*.js)       ->  concatenated into ONE <script> block
                                (they share one global closure)

    Keeping them concatenated (not separate <script src=>) is deliberate:
    the code relies on hoisted top-level `const`/`let` declarations being
    visible across fragments (e.g. `agentId` defined in 01-core.js is
    used in 11-config.js).
  -->
  <style>/*{{STYLES}}*/</style>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js" crossorigin="anonymous"></script>
</head>

{{SCRIPTS}}

</body>
