        <fieldset class="section" id="fieldsetLlmPresets">
          <div class="section__header">
            <h3 class="section__title">多模型预设</h3>
            <div class="row-actions" style="display:flex;gap:var(--sp-2);margin:0;">
              <button type="button" class="btn btn--primary btn--sm" id="btnLlmPresetAdd">+ 新增</button>
              <button type="button" class="btn btn--ghost btn--sm" id="btnLlmPresetRefresh">刷新</button>
            </div>
          </div>
          <p class="section__desc">
            设置不同的 AI 模型，聊天时可以在输入框上方快速切换。每个预设可以配置接口地址、模型名和密钥。点击卡片即可展开编辑。
          </p>
          <div id="llmPresetList" class="preset-list" style="margin-bottom: var(--sp-4);"></div>
          <div id="llmPresetStatus" class="status-line"></div>
        </fieldset>

        <fieldset class="section" id="fieldsetPaths">
          <div class="section__header">
            <h3 class="section__title">目录与权限</h3>
          </div>
          <div id="configPathsDisplay" style="margin-bottom:var(--sp-3);"></div>
          <div id="allowlistConfig"></div>
        </fieldset>

        <fieldset class="section" id="fieldsetGitRemote">
          <div class="section__header">
            <h3 class="section__title">🔗 Git 远程仓库</h3>
          </div>
          <p class="section__desc">
            管理 SSH 密钥、HTTPS 凭据和 Git 代理。设置默认值后，新建项目时会自动预填。
          </p>

          <!-- 默认远程配置 -->
          <div id="gitDefaultsSection" style="margin-bottom:var(--sp-3);padding:var(--sp-3);border:1px solid var(--border);border-radius:6px;">
            <div style="font-weight:500;font-size:12px;margin-bottom:var(--sp-2);">📋 默认远程配置</div>
            <label class="checkbox-row" style="margin-bottom:var(--sp-2);">
              <input type="checkbox" id="chkGitDefaultEnabled"/>
              <span>新建项目时默认启用远程仓库</span>
            </label>
            <div id="gitDefaultsForm" style="display:none;">
              <div class="form-row">
                <label class="form-label" for="selGitDefaultProvider">平台</label>
                <select id="selGitDefaultProvider" class="md-select" style="max-width:160px;">
                  <option value="github">GitHub</option>
                  <option value="gitlab">GitLab</option>
                  <option value="gitee">Gitee</option>
                  <option value="bitbucket">Bitbucket</option>
                </select>
              </div>
              <div class="form-row">
                <label class="form-label" for="inpGitDefaultOwner">所有者</label>
                <input type="text" id="inpGitDefaultOwner" class="form-input-sm" placeholder="用户名或组织名" style="max-width:200px;">
              </div>
              <div class="form-row">
                <label class="form-label">协议</label>
                <div style="display:flex;gap:12px;align-items:center;">
                  <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;">
                    <input type="radio" name="gitDefaultProtocol" value="ssh" checked> SSH
                  </label>
                  <label style="font-size:12px;display:flex;align-items:center;gap:4px;cursor:pointer;">
                    <input type="radio" name="gitDefaultProtocol" value="https"> HTTPS
                  </label>
                </div>
              </div>
              <label class="checkbox-row">
                <input type="checkbox" id="chkGitDefaultAutoPush"/>
                <span>创建后自动推送初始提交</span>
              </label>
              <div class="row-actions" style="margin-top:var(--sp-2);">
                <button type="button" class="btn btn--primary btn--sm" id="btnGitDefaultsSave">保存默认值</button>
                <span id="gitDefaultsStatus" class="status-line" style="display:inline;margin-left:8px;"></span>
              </div>
            </div>
          </div>
